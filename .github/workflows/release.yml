name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows portable package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build SingBoxManager
        shell: pwsh
        run: .\build.ps1

      - name: Package portable zip
        shell: pwsh
        run: |
          $packageName = "SingBoxManager-windows-x64"
          $packageDir = "release\$packageName"

          New-Item -ItemType Directory -Force $packageDir | Out-Null

          Copy-Item SingBoxManager.exe $packageDir\
          Copy-Item sing-box.exe $packageDir\
          Copy-Item sing-box.ico $packageDir\
          Copy-Item Microsoft.Web.WebView2.Core.dll $packageDir\
          Copy-Item Microsoft.Web.WebView2.WinForms.dll $packageDir\
          Copy-Item WebView2Loader.dll $packageDir\
          Copy-Item README.md $packageDir\

          Compress-Archive -Path "$packageDir\*" -DestinationPath "release\$packageName.zip" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/SingBoxManager-windows-x64.zip
          generate_release_notes: true
